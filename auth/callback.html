<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRAFT_LOG — Connecting...</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8e8f0;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .box {
    background: #111118;
    border: 1px solid #22222e;
    border-radius: 16px;
    padding: 48px 40px;
    max-width: 420px;
    width: 90%;
    text-align: center;
  }

  .top-line {
    height: 3px;
    background: linear-gradient(90deg, #c8ff4a, #4af0c8);
    border-radius: 16px 16px 0 0;
    margin: -48px -40px 40px;
    border-radius: 16px 16px 0 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: #e8e8f0;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }

  .logo span { color: #c8ff4a; }

  .sub {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #5a5a72;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .status-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }

  .status-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #c8ff4a;
  }

  .status-msg {
    font-size: 11px;
    color: #5a5a72;
    line-height: 1.6;
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }

  .btn {
    display: inline-block;
    background: #c8ff4a;
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 14px 32px;
    border-radius: 8px;
    transition: opacity 0.2s;
    cursor: pointer;
    border: none;
  }

  .btn:hover { opacity: 0.85; }

  .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 2px solid #22222e;
    border-top-color: #c8ff4a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error { color: #ff4a6b; }
</style>
</head>
<body>

<div class="box">
  <div class="top-line"></div>
  <div class="logo">CRAFT<span>_</span>LOG</div>
  <div class="sub">Sorare Craft Tracker</div>

  <div id="content">
    <div class="spinner"></div>
    <div class="status-title">Connecting...</div>
    <div class="status-msg">Verifying your Sorare account...</div>
  </div>
</div>

<script>
  const SUPABASE_URL    = 'https://jxhdlcpdupmkpsoytzes.supabase.co';
  const ANON_KEY        = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4aGRsY3BkdXBta3Bzb3l0emVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjQwMjQsImV4cCI6MjA4OTM0MDAyNH0.bvOQf7cF05GWafdb-vR7V9bphLjvgqTuY2BTLLGPnQM';
  const SORARE_CALLBACK = 'https://craftlog.pro/auth/callback';

  function showSuccess(nickname) {
    document.getElementById('content').innerHTML = `
      <span class="status-icon">✓</span>
      <div class="status-title">Erfolgreich verbunden!</div>
      <div class="status-msg">
        Willkommen, <strong style="color:#e8e8f0">${nickname}</strong>!<br>
        Dein Sorare Account wurde erfolgreich verknüpft.
      </div>
      <a class="btn" href="https://craftlog.pro">Zu CRAFT_LOG →</a>
    `;
  }

  function showError(msg) {
    document.getElementById('content').innerHTML = `
      <span class="status-icon">✗</span>
      <div class="status-title error">Verbindung fehlgeschlagen</div>
      <div class="status-msg">${msg}</div>
      <a class="btn" href="https://craftlog.pro">Zurück zur App</a>
    `;
  }

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');

    if (!code) {
      showError('Kein Autorisierungscode gefunden.');
      return;
    }

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/sorare-oauth`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + ANON_KEY,
        },
        body: JSON.stringify({
          action:       'exchange',
          code,
          redirect_uri: SORARE_CALLBACK,
        }),
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      // Store tokens in localStorage so craftlog.pro can read them
      localStorage.setItem('sorare_token',   data.access_token);
      localStorage.setItem('sorare_refresh',  data.refresh_token);
      localStorage.setItem('sorare_user',     JSON.stringify(data.user));

      const nickname = data.user?.nickname || 'Manager';
      showSuccess(nickname);

      // Auto-redirect after 2 seconds
      setTimeout(() => { window.location.href = 'https://craftlog.pro'; }, 2000);

    } catch(e) {
      showError(e.message);
    }
  }

  handleCallback();
</script>

</body>
</html>
